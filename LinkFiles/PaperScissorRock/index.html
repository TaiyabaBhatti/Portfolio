<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game using Html, CSS and javascript</title>
    <script src="https://kit.fontawesome.com/24f84cfde2.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">



</head>
<body>

    <h1 class="heading" >Rock Paper Scissors</h1>
    <section id="activity">

<div id="options">
<img src="./rock.png" alt="Rock" class="opt" id="rock">
<img src="./paper.png" alt="Paper" class="opt" id="paper">
<img src="./scissor.png" alt="Scissor" class="opt" id="scissor">
</div>

<div id="score-section">
<div id="playerOne" class="player">
<p class="score">0</p>
<p class="title">You</p>
</div>
<div id="playerTwo" class="player">
<p class="score">0</p>
<p class="title">Computer</p>
</div>
</div>
<button id="move-btn">Pick Your move</button>




    </section>











<script src="./javascript.js"></script>
</body>
</html>
